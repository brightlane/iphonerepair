name: Daily Blog Generator
on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 every day
  workflow_dispatch: # Allows manual trigger

jobs:
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install openai requests python-frontmatter

      - name: Generate Post & Audio
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python scripts/generate_daily.py

      - name: Commit and Push
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "bot@brightlane.io"
          git add content/blog/*.md
          git commit -m "Auto-generated daily post: $(date +'%Y-%m-%d')"
          git push
