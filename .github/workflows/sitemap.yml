name: Generate sitemap
on:
  push:
    branches: [ main ]
jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3
        with:name: Generate sitemap
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4 # Updated to v4
        with:
          fetch-depth: 0 

      - name: Generate the sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://brightlane.github.io/elevenlabs.com/

      - name: Commit and push if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          # Check if sitemap.xml was actually changed
          if ! git diff --quiet sitemap.xml; then
            git add sitemap.xml
            git commit -m "Automated sitemap update"
            git push
          else
            echo "No changes to sitemap.xml, skipping commit."
          fi
          fetch-depth: 0 
      - name: Generate the sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://brightlane.github.io/elevenlabs.com/
      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add sitemap.xml
          git commit -m "Automated sitemap update"
          git push
